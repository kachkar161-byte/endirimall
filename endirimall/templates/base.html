{% load i18n static %}
<!DOCTYPE html>
<html lang="{% get_current_language %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Endirimall{% endblock %}</title>
  <meta name="description" content="Endirimall - Discover the best discounts across stores.">
  <meta name="keywords" content="discounts, deals, coupons, sales, endirim">
  <meta property="og:title" content="Endirimall">
  <meta property="og:description" content="Discover the best discounts across stores.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="/">
  <meta property="og:image" content="{% static 'img/og-image.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include 'includes/navbar.html' %}
  <main class="container py-3">
    {% include 'includes/messages.html' %}
    {% block content %}{% endblock %}
  </main>
  <footer class="border-top py-4 mt-5">
    <div class="container text-center text-muted">
      <p class="mb-0">&copy; {{ now|date:'Y' }} Endirimall</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/search.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
