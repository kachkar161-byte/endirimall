{% extends 'base.html' %}

{% block title %}{% trans 'Login' %} | Endirimall{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h2 class="mb-4">{% trans 'Login' %}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">{% trans 'Login' %}</button>
        </form>
        <p class="mt-3">{% trans "Don't have an account?" %} <a href="{% url 'accounts:signup' %}">{% trans 'Sign Up' %}</a></p>
    </div>
</div>
{% endblock %}
