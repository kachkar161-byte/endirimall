{% extends 'base.html' %}

{% block title %}{% trans 'Sign Up' %} | Endirimall{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h2 class="mb-4">{% trans 'Sign Up' %}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">{% trans 'Create account' %}</button>
        </form>
        <p class="mt-3">{% trans 'Already have an account?' %} <a href="{% url 'accounts:login' %}">{% trans 'Login' %}</a></p>
    </div>
</div>
{% endblock %}
