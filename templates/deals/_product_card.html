<div class="card h-100">
    <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ product.name }}</h5>
        <p class="card-text text-muted">{{ product.store.name }}</p>
        <p class="card-text fw-bold">{{ product.discount_price }} ₼ <span class="text-decoration-line-through text-muted small">{{ product.original_price }} ₼</span></p>
        <span class="badge bg-success mb-2">-{{ product.discount_percentage }}%</span>
        <div class="mt-auto d-flex justify-content-between align-items-center">
            <a href="{% url 'deals:product_detail' product.pk %}" class="btn btn-primary btn-sm">{% trans 'View' %}</a>
            <button class="btn btn-outline-danger btn-sm toggle-favorite" data-id="{{ product.id }}">
                <i class="bi {{ product|favorite_icon:user }}"></i>
            </button>
        </div>
    </div>
</div>
